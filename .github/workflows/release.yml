# SPDX-License-Identifier: AGPL-3.0-only
# Shunt — LLM proxy with KV-cache reuse routing
# Release workflow: triggered on tag push v*
# Pipeline: ci → build-release → docker-build → deploy-staging → smoke-test → deploy-prod

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: Cross-compile ReleaseSafe (x86_64-linux)
        run: zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: shunt-x86_64-linux
          path: zig-out/bin/shunt
          retention-days: 5

  docker-build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          SEMVER="${GITHUB_REF_NAME}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    steps:
      - name: SSH deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/shunt
            docker compose pull
            docker compose up -d

  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Wait for staging to be ready
        run: |
          TIMEOUT=60
          elapsed=0
          while [ $elapsed -lt $TIMEOUT ]; do
            if curl -sf "https://${{ secrets.STAGING_HOST }}/healthz" >/dev/null 2>&1; then
              echo "/healthz OK"
              break
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          if [ $elapsed -ge $TIMEOUT ]; then
            echo "FAIL: /healthz not responding within ${TIMEOUT}s"
            exit 1
          fi

      - name: Check /healthz
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' "https://${{ secrets.STAGING_HOST }}/healthz")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /healthz returned $STATUS"
            exit 1
          fi
          echo "PASS: /healthz returned 200"

      - name: Check /readyz
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' "https://${{ secrets.STAGING_HOST }}/readyz")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /readyz returned $STATUS (expected 200)"
            exit 1
          fi
          echo "PASS: /readyz returned 200"

  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production
    steps:
      - name: SSH deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/shunt
            docker compose pull
            docker compose up -d
