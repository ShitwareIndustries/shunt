[balancer]
listen_addr = "0.0.0.0:8080"
health_check_interval_ms = 2000
log_level = "info"

[logging]
level = "info"
format = "json"
output = "stdout"

[cache]
cache_enabled = true
cache_ttl_ms = 300000
cache_max_entries_per_backend = 256

# Authentication
# When enabled, API key is required on /v1/ endpoints via Authorization: Bearer <key>
# Health, metrics, and models endpoints remain public.
[auth]
enabled = false # Set to true for production

# [[auth.keys]]
# key = "shunt_sk_your-secret-key-here"
# rate_limit = 10 # requests per second per key
# burst = 20 # max burst size

[[models]]
id = "llama3-primary"
address = "http://127.0.0.1:8081"
model = "llama3"

[[models]]
id = "llama3-secondary"
address = "http://127.0.0.1:8082"
model = "llama3"

[[models]]
id = "gpt-4-backend"
address = "http://127.0.0.1:8083"
model = "gpt-4"

# vLLM backend example
# vLLM uses the OpenAI-compatible API on port 8000 by default.
# Set backend_type = "vllm" for vLLM-specific health checks and timeouts.
# [[models]]
# id = "vllm-primary"
# address = "http://127.0.0.1:8000"
