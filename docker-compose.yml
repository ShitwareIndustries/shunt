# Shunt — Blue-green deployment with Caddy reverse proxy
#
# Architecture:
# - shunt-blue: active instance on internal port 8080 (mapped to 8081)
# - shunt-green: standby instance on internal port 8080 (mapped to 8082)
# - caddy: reverse proxy on :80/:443, load-balances across both
#   with active health checking via /health
#
# Health checking strategy:
# Docker HEALTHCHECK (via wget in alpine runtime) probes /health every 30s.
# Caddy additionally probes /health on each upstream for request-level routing.
#
# Config can be provided via:
# 1. Mounted config file: ./config.toml:/etc/shunt/config.toml:ro
# 2. Environment variables: LB_LISTEN_ADDR, LB_HEALTH_CHECK_INTERVAL, etc.
#
# Usage:
#   docker compose up -d
#   curl http://localhost/health          # via Caddy
#   curl http://localhost:8081/health     # direct to blue
#   curl http://localhost:8082/health     # direct to green

services:
  shunt-blue:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./config.example.toml:/etc/shunt/config.toml:ro
    environment:
      - LB_CONFIG=/etc/shunt/config.toml
    restart: unless-stopped

  shunt-green:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ./config.example.toml:/etc/shunt/config.toml:ro
    environment:
      - LB_CONFIG=/etc/shunt/config.toml
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./cfg/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      shunt-blue:
        condition: service_started
      shunt-green:
        condition: service_started
    restart: unless-stopped
